<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FJPL</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div class="logo">
<span>FJPL</span>
</div>


<h1>فانتزي دوري المحترفين الأردني</h1>

<p>
كوّن فريقك، نافس أصدقائك، وكن أفضل مدرب
</p>



<div class="card" id="loginBox">

<h2>تسجيل الدخول</h2>


<input id="email" type="email" placeholder="البريد الإلكتروني">


<input id="password" type="password" placeholder="كلمة المرور">


<button id="loginBtn">
دخول
</button>



<p>
ليس لديك حساب؟
<a href="#" id="showRegister">إنشاء حساب</a>
</p>


</div>




<div class="card hidden" id="registerBox">


<h2>إنشاء حساب</h2>


<input id="newEmail" type="email" placeholder="البريد الإلكتروني">


<input id="newPassword" type="password" placeholder="كلمة المرور">


<button id="registerBtn">
إنشاء الحساب
</button>


<p>
<a href="#" id="showLogin">لدي حساب</a>
</p>


</div>



</div>



<script type="module" src="app.js"></script>


</body>
</html>
