<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FJPL - Fantasy Jordan Pro League</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(160deg,#06111f,#0b2a24);
color:white;
text-align:center;
}

.container{
padding:35px 20px;
}


.logo{
width:120px;
height:140px;
margin:auto;
background:linear-gradient(145deg,#22c55e,#15803d);
clip-path:polygon(50% 0%,90% 15%,90% 65%,50% 100%,10% 65%,10% 15%);
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
font-weight:bold;
box-shadow:0 0 30px #22c55e;
}


.subtitle{
color:#facc15;
font-size:14px;
margin-top:15px;
}


.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
margin-top:35px;
}


h1{
font-size:28px;
}


input{
width:90%;
padding:15px;
margin:8px;
border-radius:12px;
border:none;
font-size:16px;
}


button{
width:90%;
padding:15px;
margin:10px;
border:none;
border-radius:15px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:bold;
}


button:hover{
opacity:.8;
}


.secondary{
background:#facc15;
color:#111;
}


.hidden{
display:none;
}


a{
color:#22c55e;
}


</style>

</head>


<body>


<div class="container">


<div class="logo">
FJPL
</div>

<div class="subtitle">
Fantasy Jordan Pro League
</div>



<div id="home" class="card">

<h1>
فانتزي دوري المحترفين الأردني
</h1>

<p>
كوّن فريقك، نافس العالم، وكن أفضل مدرب
</p>


<button onclick="showLogin()">
ابدأ اللعب
</button>


</div>




<div id="login" class="card hidden">

<h1>
تسجيل الدخول
</h1>


<input id="loginEmail" placeholder="البريد الإلكتروني">

<input id="loginPassword" type="password" placeholder="كلمة المرور">


<button onclick="loginUser()">
دخول
</button>


<p>
ليس لديك حساب؟
<a href="#" onclick="showRegister()">إنشاء حساب</a>
</p>


</div>




<div id="register" class="card hidden">


<h1>
إنشاء حساب
</h1>


<input id="registerName" placeholder="الاسم">


<input id="registerEmail" placeholder="البريد الإلكتروني">


<input id="registerPassword" type="password" placeholder="كلمة المرور">


<button onclick="registerUser()">
إنشاء الحساب
</button>


<p>
<a href="#" onclick="showLogin()">لدي حساب</a>
</p>


</div>



</div>





<script>


function hideAll(){

home.classList.add("hidden");
login.classList.add("hidden");
register.classList.add("hidden");

}


function showLogin(){

hideAll();
login.classList.remove("hidden");

}



function showRegister(){

hideAll();
register.classList.remove("hidden");

}


</script>





<script type="module">


import { initializeApp } from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";





const firebaseConfig = {

apiKey: "AIzaSyBnDMNY8yqYYWaWiqzk57QlibmhOFTjlPA",

authDomain: "fjpl-d2dbc.firebaseapp.com",

projectId: "fjpl-d2dbc",

storageBucket: "fjpl-d2dbc.firebasestorage.app",

messagingSenderId: "917833760111",

appId: "1:917833760111:web:f5423e8cee682c7e4bbc9a"

};





const app = initializeApp(firebaseConfig);

const auth = getAuth(app);





window.registerUser=function(){


let email=document.getElementById("registerEmail").value;

let password=document.getElementById("registerPassword").value;


createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("تم إنشاء الحساب بنجاح");

showLogin();

})


.catch(e=>{

alert(e.message);

});


}





window.loginUser=function(){


let email=document.getElementById("loginEmail").value;

let password=document.getElementById("loginPassword").value;



signInWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("تم تسجيل الدخول بنجاح");

})


.catch(e=>{

alert(e.message);

});


}





</script>


</body>
</html>
